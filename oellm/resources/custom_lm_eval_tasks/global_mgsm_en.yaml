tag:
  - global_mgsm
task: global_mgsm_en
dataset_path: CohereLabs/global-mgsm
dataset_name: en
output_type: generate_until
test_split: test
doc_to_text: "{{instruction}}\n\nQuestion: {{question}}\n{{answer_prefix}}:"
doc_to_target: "{{answer}}"
target_delimiter: " "
generation_kwargs:
  until:
    - "\n"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
filter_list:
  - name: flexible-extract
    filter:
      - function: regex
        group_select: -1
        regex_pattern: "(-?[$0-9.,]{2,})|(-?[0-9]+)"
      - function: take_first
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
    regexes_to_ignore:
      - ","
      - "\\$"
metadata:
  version: 1.0
